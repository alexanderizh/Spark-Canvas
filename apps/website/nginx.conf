# Spark Agent 官网 nginx 配置
# 关键：官网用手写 pathname 路由（无 react-router），刷新任意路径必须 fallback 到 index.html
server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;
    charset utf-8;

    # gzip 压缩
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml image/svg+xml text/javascript;

    # 带 hash 的静态资源 —— 长缓存 + immutable
    location ^~ /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 图标 / manifest 等根目录静态文件
    location ~* \.(?:svg|ico|png|jpg|jpeg|gif|webp|woff2?|ttf|eot|xml|txt|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # SPA fallback：刷新任意路径都回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
